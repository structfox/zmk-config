# === USB 우선 (Dongle 전용) ===
CONFIG_ZMK_USB=y

# === 전력 관리 (동글은 USB 전원이므로 슬립 비활성화) ===
CONFIG_ZMK_SLEEP=n

# === OLED 디스플레이 ===
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y
CONFIG_ZMK_IDLE_TIMEOUT=300000

# === Dongle Display (zmk-dongle-display 모듈) ===
CONFIG_ZMK_DONGLE_DISPLAY_MAC_MODIFIERS=y
CONFIG_ZMK_DONGLE_DISPLAY_LAYER_TEXT_ALIGN="center"
CONFIG_ZMK_DONGLE_DISPLAY_WPM=n
CONFIG_ZMK_DONGLE_DISPLAY_BONGO_CAT=y

# === Split BLE 간격 (dongle ↔ peripherals) ===
# 트랙볼 폴링 레이트 향상 위해 10ms 슬롯 (100Hz) 사용. peripheral 측과 동일.
CONFIG_ZMK_SPLIT_BLE_PREF_INT=8
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=600

# === BLE 송신 출력 ===
CONFIG_BT_CTLR_TX_PWR_0=y

# === Input 처리 (peripheral에서 forwarding된 트랙볼/포인터 이벤트 수신용) ===
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
