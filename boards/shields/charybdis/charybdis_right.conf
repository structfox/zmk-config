CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

CONFIG_ZMK_EXT_POWER=y

# PMW3610 드라이버 (badjeff)
CONFIG_PMW3610_ALT=y

# 보고 간격 (ms, 기본값 0 = 무제한 / interrupt 마다 송신).
# BLE 환경에서 over-the-air 큐 적체 방지를 위해 8ms = 125Hz 로 제한.
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=8

# 초기화 시 전원 안정화 대기 시간
CONFIG_PMW3610_ALT_INIT_POWER_UP_EXTRA_DELAY_MS=1000

# 전력 관리 - 절전 모드 전환 시간
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3000
CONFIG_PMW3610_ALT_REST1_DOWNSHIFT_TIME_MS=10000
CONFIG_PMW3610_ALT_REST2_DOWNSHIFT_TIME_MS=60000

# 전력 관리 - 절전 모드 샘플링 간격 (REST2=100, REST3=500 은 기본값이라 생략)
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=20
