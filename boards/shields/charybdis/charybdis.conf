# === USB ===
CONFIG_ZMK_USB=y

# === 기본 설정 ===
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# === 디버그 로그 (엄지키/트랙볼 진단용) ===
# CONFIG_ZMK_LOG_LEVEL_DBG=y
# CONFIG_ZMK_USB_LOGGING=y

# === 포인팅 ===
# macOS에서 HID Resolution Multiplier로 마우스 입력이 멈추는 문제로 비활성화
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

# === 전력 관리 ===
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=60000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000

# === BLE 최적화 ===
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# === BLE 연결 간격 단축 (트랙볼/스플릿 지연 감소) ===
# Low Latency Packet Mode + 7.5ms 고정 (6 * 1.25ms)
CONFIG_BT_CTLR_SDC_LLPM=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# 스플릿(좌↔우) 간 BLE 간격도 단축
CONFIG_ZMK_SPLIT_BLE_PREF_INT=6
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=400

# === 딥슬립 후 BLE 재연결 개선 ===
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# === 분리형 키보드 배터리 ===
# 이슈 #3156으로 인해 비활성화 (키 입력 누락 방지)
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=n
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n
