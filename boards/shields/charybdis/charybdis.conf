# === USB ===
CONFIG_ZMK_USB=y

# === 기본 설정 ===
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# === 디버그 로그 (엄지키/트랙볼 진단용) ===
# CONFIG_ZMK_LOG_LEVEL_DBG=y
# CONFIG_ZMK_USB_LOGGING=y

# === 포인팅 ===
# macOS에서 HID Resolution Multiplier로 마우스 입력이 멈추는 문제로 비활성화
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=n

# === 전력 관리 ===
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=60000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1200000

# === BLE 최적화 ===
# nice_nano 안테나 매칭상 0 dBm이 가장 안정적 (+8 dBm은 발열/SNR 악화로 끊김 유발)
CONFIG_BT_CTLR_TX_PWR_0=y

# === BLE 처리량 강화 (split forwarding 큐 적체 감소) ===
# 한 패킷당 데이터 길이 27 → 251 bytes로 확장 (Data Length Extension)
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_DATA_LEN_UPDATE=y
# 2 Mbps PHY 명시 (nordic default y지만 보장)
CONFIG_BT_CTLR_PHY_2M=y
# GATT MTU 자동 협상 (큰 attribute 효율 송수신)
CONFIG_BT_GATT_AUTO_UPDATE_MTU=y

# === BLE 연결 간격 (트랙볼/스플릿 지연 감소) ===
# LLPM은 Nordic 전용 비표준이라 호스트 협상 실패로 끊김 유발 → 비활성화
# 간격은 7.5~15ms 범위로 풀어서 호스트 협상 여유 확보
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# 스플릿(좌↔우) 간 BLE 간격
# dongle 모드: dongle은 USB 전원이라 짧은 간격 부담 없음 → 트랙볼 폴링 레이트 향상
# 8 = 10ms 슬롯 = 100Hz (일반 마우스 수준). 6(7.5ms)까지 단축 가능하나 안정성 위험.
CONFIG_ZMK_SPLIT_BLE_PREF_INT=8
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=600

# === 딥슬립 후 BLE 재연결 개선 ===
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# === 분리형 키보드 배터리 ===
# dongle central + 트랙볼 peripheral 구조라 #3156 (트랙볼-central 키 입력 누락) 영향 없음
# 좌/우 배터리 정보를 dongle이 polling해서 host에 proxy → macOS BT 패널/OLED에 표시
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
